name: Auto-merge to main

on:
  push:
    branches:
      - 'claude/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm test

  merge:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Merge branch into main via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/merges \
            -f base=main \
            -f head=${{ github.ref_name }} \
            -f commit_message="Auto-merge ${{ github.ref_name }} into main"
