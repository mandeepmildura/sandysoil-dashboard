name: CI — tests on every push and PR

# This workflow used to auto-merge claude/* branches to main when tests passed.
# That was unsafe for an app that controls real-world pumps — a regression in
# the program-queue executor or RLS policy could go live with no human review.
#
# It now just runs tests and reports the result. Merging is manual via PR review.

on:
  push:
    branches:
      - 'main'
      - 'claude/**'
  pull_request:
    branches:
      - 'main'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm test
